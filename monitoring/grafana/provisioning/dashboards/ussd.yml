# Grafana dashboard-provider — tells Grafana to load any dashboard
# JSON it finds in /var/lib/grafana/dashboards (mounted from
# monitoring/grafana/dashboards/ by docker-compose). Adding a new
# JSON file there is a zero-click deploy — Grafana picks it up on
# its next filesystem poll (default 30 s).
apiVersion: 1

providers:
  - name: "USSD Gateway Dashboards"
    folder: "USSD"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
