# Prometheus scrape configuration for UssdGatewayTz.
#
# Deployment topology (fleet):
#   * 172.16.0.163  DASHBOARD host (this box) — dashboard, exports-
#                   worker, prometheus, grafana, node-exporter, cAdvisor.
#   * 172.16.0.162  GATEWAY host — gateway, schedulers, node-exporter,
#                   cAdvisor.
#   * 172.16.0.104  additional host — node-exporter + cAdvisor only.
#   * 172.16.0.131  additional host — node-exporter + cAdvisor only.
#
# Prometheus lives on the dashboard host and scrapes each remote host
# across the network — every scraped host's firewall must allow TCP
# 9100 (node-exporter) and 8082 (cAdvisor) inbound from 172.16.0.163.
# The gateway host additionally needs 8280 open (gateway /metrics).
#
# Every metric carries a `host` label (the box's IP) so Grafana can
# split panels per host or roll up across the fleet.
#
# When adding another host: copy one of the target blocks in the
# `node-exporter` and `cadvisor` jobs, set its IP, then
# `docker compose restart prometheus`.

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    env: production
    stack: ussd-gateway-tz

# Alerting rules — loaded from monitoring/prometheus/rules.d/ (mounted
# into the container at /etc/prometheus/rules.d/ by docker-compose).
rule_files:
  - "/etc/prometheus/rules.d/*.yml"

# Send fired alerts to Alertmanager. The Alertmanager container runs
# alongside Prometheus on the dashboard host at localhost:9093.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["localhost:9093"]

scrape_configs:

  # ----- Prometheus self-scrape (still one instance, on dashboard host) -
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9091"]

  # ----- The USSD gateway app --------------------------------------
  # `/metrics` on the gateway aggregates counters across all uvicorn
  # workers (multi-process mode; see app/metrics.py). Only exists on
  # the gateway host.
  - job_name: ussd-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["172.16.0.162:8280"]
        labels:
          service: gateway
          host:    172.16.0.162

  # ----- Host CPU / RAM / disk / network — every host in the fleet ---
  # One target per host. `host` label lets Grafana split.
  - job_name: node-exporter
    static_configs:
      - targets: ["localhost:9100"]
        labels:
          service: host
          host:    172.16.0.163
      - targets: ["172.16.0.162:9100"]
        labels:
          service: host
          host:    172.16.0.162
      - targets: ["172.16.0.104:9100"]
        labels:
          service: host
          host:    172.16.0.104
      - targets: ["172.16.0.131:9100"]
        labels:
          service: host
          host:    172.16.0.131

  # ----- Per-container CPU / memory / IO / up-state — every host ----
  # cAdvisor exposes one series per container per family; combined
  # with the `host` label you can see "which containers on which
  # host" at a glance.
  - job_name: cadvisor
    static_configs:
      - targets: ["localhost:8082"]
        labels:
          service: containers
          host:    172.16.0.163
      - targets: ["172.16.0.162:8082"]
        labels:
          service: containers
          host:    172.16.0.162
      - targets: ["172.16.0.104:8082"]
        labels:
          service: containers
          host:    172.16.0.104
      - targets: ["172.16.0.131:8082"]
        labels:
          service: containers
          host:    172.16.0.131

  # ----- RabbitMQ nodes ---------------------------------------------
  # `rabbitmq_prometheus` plugin (bundled with RabbitMQ 3.8+) exposes
  # aggregated cluster + vhost metrics on :15692/metrics. Enable on
  # the target host with:
  #     rabbitmq-plugins enable rabbitmq_prometheus
  # then open :15692 to Prometheus's IP.
  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets: ["172.16.0.131:15692"]
        labels:
          service: rabbitmq
          host:    172.16.0.131
      - targets: ["172.16.0.44:15692"]
        labels:
          service: rabbitmq
          host:    172.16.0.44

  # ----- RabbitMQ per-object detail (per-queue depth, per-exchange
  #       throughput). Same nodes but the `detailed` endpoint. This
  #       is heavier — scrape less often and only if the queue count
  #       is bounded (< a few hundred). Broker versions ≥ 3.10:
  #         /metrics/detailed
  #       Older 3.8-3.9:
  #         /metrics/per-object
  #       Adjust `metrics_path` if your broker is on 3.9 or below.
  - job_name: rabbitmq-per-queue
    scrape_interval: 30s
    metrics_path: /metrics/detailed
    params:
      family: [queue_coarse_metrics, queue_metrics, queue_consumer_count]
    static_configs:
      - targets: ["172.16.0.131:15692"]
        labels:
          service: rabbitmq
          host:    172.16.0.131
      - targets: ["172.16.0.44:15692"]
        labels:
          service: rabbitmq
          host:    172.16.0.44

  # ----- Dashboard (optional) -----------------------------------
  # The Next.js dashboard doesn't ship a /metrics endpoint today.
  # Uncomment when it does.
  # - job_name: dashboard-app
  #   metrics_path: /api/metrics
  #   static_configs:
  #     - targets: ["localhost:3000"]
  #       labels:
  #         service: dashboard
  #         host:    172.16.0.163
