# Prometheus scrape configuration for UssdGatewayTz.
#
# Deployment topology (2 hosts):
#   * DASHBOARD HOST  (vm-web-tz-svr) runs: dashboard, exports-worker,
#     prometheus, grafana, node-exporter, cAdvisor.
#   * GATEWAY HOST    (172.16.0.162)  runs: gateway, schedulers,
#     node-exporter, cAdvisor.
#
# Prometheus lives on the dashboard host and scrapes the gateway host
# across the network — the gateway host's firewall must allow TCP
# 8082, 8280 and 9100 inbound from this dashboard host.
#
# Every metric carries a `host` label ('dashboard' | 'gateway') so
# Grafana can split panels per host or roll up across the fleet.
#
# If the gateway IP changes, search-replace 172.16.0.162 below and
# `docker compose restart prometheus`.

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    env: production
    stack: ussd-gateway-tz

scrape_configs:

  # ----- Prometheus self-scrape (still one instance, on dashboard host) -
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9091"]

  # ----- The USSD gateway app --------------------------------------
  # `/metrics` on the gateway aggregates counters across all uvicorn
  # workers (multi-process mode; see app/metrics.py). Only exists on
  # the gateway host.
  - job_name: ussd-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["172.16.0.162:8280"]
        labels:
          service: gateway
          host:    172.16.0.162

  # ----- Host CPU / RAM / disk / network — both hosts --------------
  # One target per host. `host` label lets Grafana split.
  - job_name: node-exporter
    static_configs:
      - targets: ["localhost:9100"]
        labels:
          service: host
          host:    172.16.0.163
      - targets: ["172.16.0.162:9100"]
        labels:
          service: host
          host:    172.16.0.162

  # ----- Per-container CPU / memory / IO / up-state — both hosts ---
  # cAdvisor exposes one series per container per family; combined
  # with the `host` label you can see "which containers on which
  # host" at a glance.
  - job_name: cadvisor
    static_configs:
      - targets: ["localhost:8082"]
        labels:
          service: containers
          host:    172.16.0.163
      - targets: ["172.16.0.162:8082"]
        labels:
          service: containers
          host:    172.16.0.162

  # ----- Dashboard (optional) -----------------------------------
  # The Next.js dashboard doesn't ship a /metrics endpoint today.
  # Uncomment when it does.
  # - job_name: dashboard-app
  #   metrics_path: /api/metrics
  #   static_configs:
  #     - targets: ["localhost:3000"]
  #       labels:
  #         service: dashboard
  #         host:    172.16.0.163
