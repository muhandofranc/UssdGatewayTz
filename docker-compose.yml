services:
  # ----------------------------------------------------------------
  # Postgres lives on the HOST (systemd-managed `postgresql` service,
  # listening on 127.0.0.1:${USSD_PG_PORT}, default 5410). The
  # host-networked services below reach it directly via 127.0.0.1.
  # Earlier iterations of this compose ran a `postgres:` container —
  # removed once the host service became the canonical dev DB so we
  # don't fight it for port 5410. To go containerised again, restore
  # the service from git history and stop the systemd unit
  # (`sudo systemctl stop postgresql && sudo systemctl disable postgresql`)
  # so the bind succeeds.
  # ----------------------------------------------------------------

  gateway:
    build:
      context: .
      args:
        APT_REFRESH: ${APT_REFRESH:-build}
    container_name: ussd-gateway-tz
    restart: unless-stopped
    # network_mode=host so the container reaches the host's local
    # Postgres on 127.0.0.1:${USSD_PG_PORT} (dev box where the DB
    # is co-located). When the DB moves to a truly external host,
    # switch back to a bridge network + put `ports: ["8080:8080"]`
    # below to expose the gateway. (`ports:` is ignored with host
    # networking — uvicorn already binds to host:8080.)
    network_mode: host
    environment:
      # ---- Postgres (external host — set creds in .env) -----------
      USSD_PG_HOST:     ${USSD_PG_HOST}
      USSD_PG_PORT:     ${USSD_PG_PORT:-5432}
      USSD_PG_USER:     ${USSD_PG_USER}
      USSD_PG_PASSWORD: ${USSD_PG_PASSWORD}
      USSD_PG_DB:       ${USSD_PG_DB}
      USSD_PG_SSLMODE:  ${USSD_PG_SSLMODE:-prefer}

      # ---- Bootstrap admin (optional; see .env block) -------------
      BOOTSTRAP_ADMIN_EMAIL:    ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}

      # ---- Gateway tuning -----------------------------------------
      USSD_HANDLER_DEFAULT_TIMEOUT_SECS: ${USSD_HANDLER_DEFAULT_TIMEOUT_SECS:-5}
      USSD_LOG_LEVEL: ${USSD_LOG_LEVEL:-INFO}

      # ---- Halotel (async-outbound SOAP) --------------------------
      HALOTEL_INBOUND_USER:          ${HALOTEL_INBOUND_USER:-}
      HALOTEL_INBOUND_PASS:          ${HALOTEL_INBOUND_PASS:-}
      HALOTEL_OUTBOUND_URL:          ${HALOTEL_OUTBOUND_URL:-}
      HALOTEL_OUTBOUND_USER:         ${HALOTEL_OUTBOUND_USER:-}
      HALOTEL_OUTBOUND_PASS:         ${HALOTEL_OUTBOUND_PASS:-}
      HALOTEL_USSDGW_ID:             ${HALOTEL_USSDGW_ID:-1}
      HALOTEL_OUTBOUND_TIMEOUT_SECS: ${HALOTEL_OUTBOUND_TIMEOUT_SECS:-4}


  # ----------------------------------------------------------------
  # Daily scheduler — fires once a day at SCHEDULER_TIME (UTC, default
  # 02:00). Refreshes yesterday's daily_session_summary row so the
  # /summary page + Overview chart's PAST-days bars stay current.
  # Edit TASKS_DAILY in app/scheduler.py to add more nightly tasks.
  # ----------------------------------------------------------------
  scheduler:
    build:
      context: .
      args:
        APT_REFRESH: ${APT_REFRESH:-build}
    container_name: ussd-scheduler
    restart: unless-stopped
    network_mode: host
    environment:
      USSD_PG_HOST:     ${USSD_PG_HOST}
      USSD_PG_PORT:     ${USSD_PG_PORT:-5432}
      USSD_PG_USER:     ${USSD_PG_USER}
      USSD_PG_PASSWORD: ${USSD_PG_PASSWORD}
      USSD_PG_DB:       ${USSD_PG_DB}
      USSD_PG_SSLMODE:  ${USSD_PG_SSLMODE:-prefer}
      SCHEDULER_MODE:   daily
      SCHEDULER_TIME:   ${SCHEDULER_TIME:-02:00}      # UTC, HH:MM
      LOG_LEVEL:        ${USSD_LOG_LEVEL:-INFO}
    command: ["python", "-m", "app.scheduler"]

  # ----------------------------------------------------------------
  # Intraday scheduler — fires every SCHEDULER_INTERVAL_SECS (default
  # 300 = 5 min). Refreshes today_session_summary_mv so the Overview
  # chart's TODAY bar tracks live traffic. Edit TASKS_INTRADAY in
  # app/scheduler.py to add more frequent tasks.
  # ----------------------------------------------------------------
  scheduler-intraday:
    build:
      context: .
      args:
        APT_REFRESH: ${APT_REFRESH:-build}
    container_name: ussd-scheduler-intraday
    restart: unless-stopped
    network_mode: host
    environment:
      USSD_PG_HOST:           ${USSD_PG_HOST}
      USSD_PG_PORT:           ${USSD_PG_PORT:-5432}
      USSD_PG_USER:           ${USSD_PG_USER}
      USSD_PG_PASSWORD:       ${USSD_PG_PASSWORD}
      USSD_PG_DB:             ${USSD_PG_DB}
      USSD_PG_SSLMODE:        ${USSD_PG_SSLMODE:-prefer}
      SCHEDULER_MODE:         intraday
      SCHEDULER_INTERVAL_SECS: ${SCHEDULER_INTERVAL_SECS:-300}
      LOG_LEVEL:              ${USSD_LOG_LEVEL:-INFO}
    command: ["python", "-m", "app.scheduler"]      

# Named volume shared between the dashboard (writes the file path
# into portal_exports.file_path and streams it on /api/exports/<id>/
# download) and the worker (produces the CSV here).
volumes:
  ussd_exports:
