services:
  # ----------------------------------------------------------------
  # Postgres lives on the HOST (systemd-managed `postgresql` service,
  # listening on 127.0.0.1:${USSD_PG_PORT}, default 5410). The
  # host-networked services below reach it directly via 127.0.0.1.
  # Earlier iterations of this compose ran a `postgres:` container —
  # removed once the host service became the canonical dev DB so we
  # don't fight it for port 5410. To go containerised again, restore
  # the service from git history and stop the systemd unit
  # (`sudo systemctl stop postgresql && sudo systemctl disable postgresql`)
  # so the bind succeeds.
  # ----------------------------------------------------------------

  gateway:
    build:
      context: .
      args:
        APT_REFRESH: ${APT_REFRESH:-build}
    container_name: ussd-gateway-tz
    restart: unless-stopped
    # network_mode=host so the container reaches the host's local
    # Postgres on 127.0.0.1:${USSD_PG_PORT} (dev box where the DB
    # is co-located). When the DB moves to a truly external host,
    # switch back to a bridge network + put `ports: ["8080:8080"]`
    # below to expose the gateway. (`ports:` is ignored with host
    # networking — uvicorn already binds to host:8080.)
    network_mode: host
    environment:
      # ---- Postgres (external host — set creds in .env) -----------
      USSD_PG_HOST:     ${USSD_PG_HOST}
      USSD_PG_PORT:     ${USSD_PG_PORT:-5432}
      USSD_PG_USER:     ${USSD_PG_USER}
      USSD_PG_PASSWORD: ${USSD_PG_PASSWORD}
      USSD_PG_DB:       ${USSD_PG_DB}
      USSD_PG_SSLMODE:  ${USSD_PG_SSLMODE:-prefer}

      # ---- Bootstrap admin (optional; see .env block) -------------
      BOOTSTRAP_ADMIN_EMAIL:    ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}

      # ---- Gateway tuning -----------------------------------------
      USSD_HANDLER_DEFAULT_TIMEOUT_SECS: ${USSD_HANDLER_DEFAULT_TIMEOUT_SECS:-5}
      USSD_LOG_LEVEL: ${USSD_LOG_LEVEL:-INFO}

      # ---- Halotel (async-outbound SOAP) --------------------------
      HALOTEL_INBOUND_USER:          ${HALOTEL_INBOUND_USER:-}
      HALOTEL_INBOUND_PASS:          ${HALOTEL_INBOUND_PASS:-}
      HALOTEL_OUTBOUND_URL:          ${HALOTEL_OUTBOUND_URL:-}
      HALOTEL_OUTBOUND_USER:         ${HALOTEL_OUTBOUND_USER:-}
      HALOTEL_OUTBOUND_PASS:         ${HALOTEL_OUTBOUND_PASS:-}
      HALOTEL_USSDGW_ID:             ${HALOTEL_USSDGW_ID:-1}
      HALOTEL_OUTBOUND_TIMEOUT_SECS: ${HALOTEL_OUTBOUND_TIMEOUT_SECS:-4}


  # ----------------------------------------------------------------
  # Daily scheduler — fires once a day at SCHEDULER_TIME (UTC, default
  # 02:00). Refreshes yesterday's daily_session_summary row so the
  # /summary page + Overview chart's PAST-days bars stay current.
  # Edit TASKS_DAILY in app/scheduler.py to add more nightly tasks.
  # ----------------------------------------------------------------
  scheduler:
    build:
      context: .
      args:
        APT_REFRESH: ${APT_REFRESH:-build}
    container_name: ussd-scheduler
    restart: unless-stopped
    network_mode: host
    environment:
      USSD_PG_HOST:     ${USSD_PG_HOST}
      USSD_PG_PORT:     ${USSD_PG_PORT:-5432}
      USSD_PG_USER:     ${USSD_PG_USER}
      USSD_PG_PASSWORD: ${USSD_PG_PASSWORD}
      USSD_PG_DB:       ${USSD_PG_DB}
      USSD_PG_SSLMODE:  ${USSD_PG_SSLMODE:-prefer}
      SCHEDULER_MODE:   daily
      SCHEDULER_TIME:   ${SCHEDULER_TIME:-02:00}      # UTC, HH:MM
      LOG_LEVEL:        ${USSD_LOG_LEVEL:-INFO}
    command: ["python", "-m", "app.scheduler"]

  # ----------------------------------------------------------------
  # Intraday scheduler — fires every SCHEDULER_INTERVAL_SECS (default
  # 300 = 5 min). Refreshes today_session_summary_mv so the Overview
  # chart's TODAY bar tracks live traffic. Edit TASKS_INTRADAY in
  # app/scheduler.py to add more frequent tasks.
  # ----------------------------------------------------------------
  scheduler-intraday:
    build:
      context: .
      args:
        APT_REFRESH: ${APT_REFRESH:-build}
    container_name: ussd-scheduler-intraday
    restart: unless-stopped
    network_mode: host
    environment:
      USSD_PG_HOST:           ${USSD_PG_HOST}
      USSD_PG_PORT:           ${USSD_PG_PORT:-5432}
      USSD_PG_USER:           ${USSD_PG_USER}
      USSD_PG_PASSWORD:       ${USSD_PG_PASSWORD}
      USSD_PG_DB:             ${USSD_PG_DB}
      USSD_PG_SSLMODE:        ${USSD_PG_SSLMODE:-prefer}
      SCHEDULER_MODE:         intraday
      SCHEDULER_INTERVAL_SECS: ${SCHEDULER_INTERVAL_SECS:-300}
      LOG_LEVEL:              ${USSD_LOG_LEVEL:-INFO}
    command: ["python", "-m", "app.scheduler"]

  # ----------------------------------------------------------------
  # Operator dashboard (Next.js, server-rendered). Reads the same
  # Postgres the gateway writes to.
  #
  # The container was previously created out-of-band (no compose
  # entry); this block makes it reproducible from compose. The
  # healthcheck deliberately hits /api/health (which exercises the
  # PG pool) rather than /login (static, can't detect a pool hang).
  # Without that, an exhausted pool leaves the dashboard "looking
  # healthy" while every authenticated page hangs — which is why
  # operators had to manually bounce it.
  # ----------------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      args:
        # Cache-buster so apk update+upgrade in the Dockerfile picks up
        # new alpine security fixes on rebuild. Drive with a unique
        # value per build (BUILD_ID / date / git short SHA) — without
        # it buildx caches the upgrade layer and silently skips fixes.
        APK_REFRESH: ${APK_REFRESH:-build}
    image: ussdgatewaytz-dashboard
    container_name: ussd-dashboard
    restart: unless-stopped
    # Same host-net rationale as the gateway: reaches the host's
    # Postgres on 127.0.0.1:${USSD_PG_PORT} without a bridge hop.
    network_mode: host
    environment:
      USSD_PG_HOST:     ${USSD_PG_HOST}
      USSD_PG_PORT:     ${USSD_PG_PORT:-5432}
      USSD_PG_USER:     ${USSD_PG_USER}
      USSD_PG_PASSWORD: ${USSD_PG_PASSWORD}
      USSD_PG_DB:       ${USSD_PG_DB}
      USSD_PG_SSLMODE:  ${USSD_PG_SSLMODE:-prefer}
      # PG pool sizing + per-query timeouts. Defaults are chosen so a
      # runaway query gets killed server-side at 30s rather than
      # holding a pool slot indefinitely — the failure mode that
      # caused the "hangs until restart" symptom 2026-06-21.
      DASHBOARD_PG_POOL_MAX:               ${DASHBOARD_PG_POOL_MAX:-10}
      DASHBOARD_PG_STATEMENT_TIMEOUT_MS:   ${DASHBOARD_PG_STATEMENT_TIMEOUT_MS:-30000}
      DASHBOARD_PG_QUERY_TIMEOUT_MS:       ${DASHBOARD_PG_QUERY_TIMEOUT_MS:-30000}
      # Session cookie + signer. SESSION_SECRET is REQUIRED — the app
      # refuses to mint sessions if it's unset or <48 chars (login &
      # audit-export both throw at request time, not boot time, which
      # is why a missing var here surfaces as a 500 on /login rather
      # than a container exit). Generate with `openssl rand -hex 32`.
      SESSION_SECRET:           ${SESSION_SECRET}
      SESSION_COOKIE_NAME:      ${SESSION_COOKIE_NAME:-ussd_dash}
      SESSION_TTL_SECONDS:      ${SESSION_TTL_SECONDS:-28800}
      SESSION_COOKIE_INSECURE:  ${SESSION_COOKIE_INSECURE:-0}
      NODE_ENV: production
      PORT:     "3000"
    volumes:
      - ussd_exports:/exports
    healthcheck:
      # /api/health does a SELECT 1 — a healthy response means BOTH
      # Next.js is up AND the PG pool can serve a connection within
      # statement_timeout. Pool exhaustion ⇒ probe 503 ⇒ docker
      # marks unhealthy ⇒ restart: unless-stopped recreates the
      # container automatically.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ----------------------------------------------------------------
  # Exports worker — polls portal_exports for queued jobs, streams
  # matching rows to a CSV in the ussd_exports volume, flips status
  # to 'ready' | 'failed'. Runs the SAME image as `dashboard:` so we
  # reuse the built worker script + node_modules; only `command:`
  # differs.
  #
  # Ships alongside `dashboard:` because both need the same volume
  # and the same PG creds. Missing this service is what caused the
  # "export queued indefinitely" bug 2026-06-30 — the image included
  # worker/exports_worker.mjs but no container was running it.
  # ----------------------------------------------------------------
  exports-worker:
    image: ussdgatewaytz-dashboard
    container_name: ussd-exports-worker
    restart: unless-stopped
    network_mode: host
    depends_on:
      dashboard:
        # `service_started` (not `_healthy`) — the dashboard doesn't
        # need to be serving requests before the worker can drain
        # the queue. Waiting for healthy would delay draining by ~30s
        # on cold starts.
        condition: service_started
    environment:
      USSD_PG_HOST:     ${USSD_PG_HOST}
      USSD_PG_PORT:     ${USSD_PG_PORT:-5432}
      USSD_PG_USER:     ${USSD_PG_USER}
      USSD_PG_PASSWORD: ${USSD_PG_PASSWORD}
      USSD_PG_DB:       ${USSD_PG_DB}
      USSD_PG_SSLMODE:  ${USSD_PG_SSLMODE:-prefer}
      # Worker tuning — matches the defaults in
      # dashboard/worker/exports_worker.mjs. Bump for prod once
      # traffic warrants it.
      EXPORTS_DIR:                       /exports
      EXPORTS_POLL_INTERVAL_MS:          ${EXPORTS_POLL_INTERVAL_MS:-3000}
      EXPORTS_CHUNK_SIZE:                ${EXPORTS_CHUNK_SIZE:-10000}
      EXPORTS_REAP_AFTER_SECONDS:        ${EXPORTS_REAP_AFTER_SECONDS:-600}
      # Retention (canonical env: hours). The worker keeps
      # EXPORTS_RETENTION_DAYS as a backwards-compat fallback (see
      # computeRetentionHours in exports_worker.mjs); ONLY set
      # DAYS below when you want a legacy override, otherwise leave
      # it out so the HOURS knob wins cleanly.
      EXPORTS_RETENTION_HOURS:           ${EXPORTS_RETENTION_HOURS:-12}
      EXPORTS_MAINTENANCE_INTERVAL_MS:   ${EXPORTS_MAINTENANCE_INTERVAL_MS:-60000}
      NODE_ENV: production
    volumes:
      - ussd_exports:/exports
    # The dashboard image bakes a `HEALTHCHECK wget /api/health` in its
    # Dockerfile (line 81). That probe is meaningful for the receiver
    # container but always fails on the worker — the worker doesn't
    # run Next.js and has nothing on :3000. Without disabling it, the
    # worker shows up as `Up (unhealthy)` and any compose commands
    # that gate on health (e.g. `--wait`) hang forever.
    #
    # `disable: true` at the compose layer overrides the image's
    # HEALTHCHECK by emitting `HEALTHCHECK NONE` at container create.
    #
    # Liveness is instead delegated to `restart: unless-stopped` for
    # crashes and the worker's own reaper query (flips zombie
    # 'running' rows back to 'queued' after REAP_AFTER_SECONDS) for
    # stuck jobs.
    healthcheck:
      disable: true
    command: ["node", "worker/exports_worker.mjs"]

  #*******ADD MONITORING HERE******************************
  # ----------------------------------------------------------------
  # Observability stack — Prometheus, Grafana, node-exporter, cAdvisor.
  #
  # Prometheus scrapes:
  #   * the gateway itself       — app-level metrics from /metrics
  #     (USSD hops, latency histograms, log-writer queue depth, HTTP
  #     request counts) — see app/metrics.py.
  #   * node-exporter            — host-level CPU, RAM, disk, network.
  #   * cAdvisor                 — per-container CPU / memory / IO
  #     rates + up/down state for every running container on the host.
  #
  # Grafana is provisioned from monitoring/grafana/provisioning/ with
  # a Prometheus datasource and a starter USSD-gateway dashboard.
  # First-boot admin password comes from GRAFANA_ADMIN_PASSWORD in
  # .env (or defaults to 'admin' — CHANGE ON FIRST DEPLOY).
  # ----------------------------------------------------------------

  # ----------------------------------------------------------------
  # One-shot init that stages Prometheus's config into a named volume
  # with 0644 perms and UID 65534 ownership. This defends against a
  # umask=077 host: `git pull` would otherwise recreate the checked-out
  # files as 0600, locking out Prometheus's `nobody` container UID and
  # putting the container in a crash-loop.
  #
  # Idempotent — re-runs on every `docker compose up` (or explicit
  # `up -d prometheus-init`) and rewrites the target files.
  # ----------------------------------------------------------------
  prometheus-init:
    image: busybox:1.36
    container_name: ussd-prometheus-init
    restart: "no"
    volumes:
      - ./monitoring/prometheus.yml:/src/prometheus.yml:ro
      - ./monitoring/prometheus/rules.d:/src/rules.d:ro
      - prometheus_conf:/dst
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        mkdir -p /dst/rules.d
        cp /src/prometheus.yml /dst/prometheus.yml
        # Some deploys legitimately have zero rule files — the `|| true`
        # keeps init idempotent in that edge case.
        find /src/rules.d -maxdepth 1 -name '*.yml' -exec cp {} /dst/rules.d/ \; || true
        # Own by 65534 (`nobody`) — the UID prometheus runs as inside
        # its container. Mode 644 so the container can read even if
        # some other tool touches these files with a stricter umask.
        chown -R 65534:65534 /dst
        find /dst -type f -exec chmod 644 {} \;
        echo "prometheus config staged ($$(find /dst -type f | wc -l) files)"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ussd-prometheus
    restart: unless-stopped
    network_mode: host
    depends_on:
      prometheus-init:
        condition: service_completed_successfully
    volumes:
      # Named volume populated by prometheus-init — see block above.
      # Prometheus reads from here, not from the host bind mount.
      - prometheus_conf:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      # Retention — 30 days keeps ~4 weeks of trend history for
      # capacity conversations without ballooning disk. Bump if you
      # need longer for postmortems, and watch the tsdb size.
      - "--storage.tsdb.retention.time=30d"
      # Bind to a non-default port so Prometheus doesn't collide with
      # anything on 9090; adjust to 9090 if you have nothing else
      # using it.
      - "--web.listen-address=0.0.0.0:9091"
      # Enable POST /-/reload so ops can hot-reload rule files
      # without restarting the container:
      #   curl -X POST http://localhost:9091/-/reload
      - "--web.enable-lifecycle"

  # ----------------------------------------------------------------
  # Alertmanager — receives alerts from Prometheus, de-duplicates
  # them into human-friendly notifications and routes to the
  # configured receiver (email / Slack / PagerDuty / …).
  #
  # Ships with a stub `default` receiver that logs to its own log
  # only — fill in monitoring/alertmanager/alertmanager.yml with a
  # real destination and `docker compose restart alertmanager`.
  # See the comments at the top of that file for the common shapes.
  # ----------------------------------------------------------------
  # ----------------------------------------------------------------
  # One-shot init that materialises Alertmanager's runtime secrets
  # from env vars (set in .env — never committed) into a shared
  # named volume. Alertmanager then mounts that volume read-only
  # and reads each secret via its `*_file:` config field.
  #
  # Add a new secret: define its env var, add a line here that
  # writes it to a file in /secrets, and reference the file from
  # alertmanager.yml. The container is idempotent — safe to re-run.
  # ----------------------------------------------------------------
  alertmanager-init:
    image: busybox:1.36
    container_name: ussd-alertmanager-init
    restart: "no"
    environment:
      # `?required` makes compose refuse to start with a helpful error
      # message if the var is missing from .env, rather than silently
      # rendering an empty password file.
      ALERTMANAGER_SMTP_PASSWORD: ${ALERTMANAGER_SMTP_PASSWORD?required in .env}
    volumes:
      - alertmanager_secrets:/secrets
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        # `printf` (not `echo`) — no trailing newline. Every SMTP
        # server treats a trailing \n as part of the password and
        # then rejects with "auth invalid".
        printf '%s' "$$ALERTMANAGER_SMTP_PASSWORD" > /secrets/smtp_password
        chmod 600 /secrets/smtp_password
        # Alertmanager's container runs as UID 65534 (`nobody`) —
        # match ownership so the file is readable there.
        chown 65534:65534 /secrets/smtp_password
        echo "smtp_password rendered ($$(wc -c < /secrets/smtp_password) bytes, owned 65534:65534)"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ussd-alertmanager
    restart: unless-stopped
    network_mode: host
    depends_on:
      alertmanager-init:
        condition: service_completed_successfully
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      # Secrets landed by alertmanager-init at container start.
      # Alertmanager reads `smtp_password` (and any future secrets)
      # via `smtp_auth_password_file` fields in alertmanager.yml.
      - alertmanager_secrets:/etc/alertmanager/secrets:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=0.0.0.0:9093"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: ussd-node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    # node-exporter needs read-only access to the host's proc/sys/root
    # filesystems to report CPU / RAM / disk / network numbers.
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
    # Args passed as a shell string so the regex-escape rules in
    # docker-compose don't mangle the `$` in `--collector.filesystem
    # .mount-points-exclude`. The exclude regex trims noisy pseudo
    # mounts (overlay, tmpfs, docker's internal state) so a `df`
    # scrape stays scannable in Grafana.
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/.+)($$|/)"
      - "--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$"
      - "--web.listen-address=0.0.0.0:9200"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: ussd-cadvisor
    restart: unless-stopped
    network_mode: host
    # cAdvisor needs read access to Docker's runtime dirs to report
    # per-container state (up/down, CPU, RAM, IO, network).
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    command:
      - "--port=8082"
    # cAdvisor bakes a HEALTHCHECK into its image that probes
    # `http://localhost:8080` — the container's default port. We run
    # on 8082 (to sidestep collisions with anything on 8080), so the
    # probe always fails and marks the container UNHEALTHY even
    # though /metrics is happily serving on 8082. Disable it —
    # liveness is delegated to `restart: unless-stopped`, and the
    # real "is it working?" signal is Prometheus's `up{job="cadvisor"}`.
    healthcheck:
      disable: true

  # ----------------------------------------------------------------
  # One-shot init that stages Grafana's dashboards + provisioning
  # (datasources + dashboard-provider yaml) into named volumes with
  # 0644 perms and UID 472 ownership.
  #
  # Same problem, same shape as prometheus-init: on a host with
  # umask=077 (or a `sudo`-based git-pull), the checked-out files come
  # out at 0600 owned by root. Grafana's runtime UID is 472; without
  # this init it silently skips any file it can't read, and the
  # dashboard appears "missing" in the UI even though the JSON is
  # right there on disk.
  #
  # Idempotent — re-run any time you edit provisioning/dashboards
  # files. The `rm -rf` at the top wipes stale artefacts so a removed
  # dashboard actually disappears from Grafana.
  # ----------------------------------------------------------------
  grafana-init:
    image: busybox:1.36
    container_name: ussd-grafana-init
    restart: "no"
    volumes:
      - ./monitoring/grafana/dashboards:/src/dashboards:ro
      - ./monitoring/grafana/provisioning:/src/provisioning:ro
      - grafana_dashboards:/dst/dashboards
      - grafana_provisioning:/dst/provisioning
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        # Fresh copy every run — Grafana's file-provider treats what
        # it finds as authoritative, so we want removals to propagate.
        rm -rf /dst/dashboards/* /dst/provisioning/*
        # `cp -a` preserves subdirectory structure so
        # provisioning/datasources/*.yml + provisioning/dashboards/*.yml
        # keep the layout Grafana expects.
        cp -a /src/dashboards/. /dst/dashboards/ 2>/dev/null || true
        cp -a /src/provisioning/. /dst/provisioning/ 2>/dev/null || true
        # UID 472 = grafana user inside grafana/grafana image.
        chown -R 472:472 /dst/dashboards /dst/provisioning
        find /dst -type f -exec chmod 644 {} \;
        find /dst -type d -exec chmod 755 {} \;
        echo "grafana config staged ($$(find /dst -type f | wc -l) files, owned 472:472)"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: ussd-grafana
    restart: unless-stopped
    network_mode: host
    depends_on:
      grafana-init:
        condition: service_completed_successfully
    volumes:
      - grafana_data:/var/lib/grafana
      # Provisioning + dashboards come from named volumes staged by
      # grafana-init (see block above). Host bind-mount was retired
      # because it kept surfacing umask=077 perm surprises.
      - grafana_provisioning:/etc/grafana/provisioning:ro
      - grafana_dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # Grafana on :3002 so it doesn't collide with the dashboard's
      # Next.js on :3000 (or any local proxy on :3000). Change here
      # if you free up 3000/3001.
      GF_SERVER_HTTP_PORT:        "3002"
      # Anonymous read-only access can be flipped on by ops later if
      # they want a public read-only stat wall on the office TV.
      GF_AUTH_ANONYMOUS_ENABLED:  "false"

# Named volume shared between the dashboard (writes the file path
# into portal_exports.file_path and streams it on /api/exports/<id>/
# download) and the worker (produces the CSV here).
volumes:
  ussd_exports:
  prometheus_data:
  prometheus_conf:
  grafana_data:
  grafana_dashboards:
  grafana_provisioning:
  alertmanager_data:
  alertmanager_secrets:
